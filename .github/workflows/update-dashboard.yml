name: 更新数据看板

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: 安装 kdocs-cli
        run: |
          curl -fsSL "https://wpsai.wpscdn.cn/skillhub/pro/v2.5.16/releases/kdocs-cli-2.5.16-linux-amd64.tar.gz" -o /tmp/kdocs.tar.gz
          tar xzf /tmp/kdocs.tar.gz -C /tmp
          mkdir -p ~/.local/bin
          cp /tmp/kdocs-cli-2.5.16-linux-amd64/kdocs-cli ~/.local/bin/
          chmod +x ~/.local/bin/kdocs-cli
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          ~/.local/bin/kdocs-cli version

      - name: 配置金山文档Token
        run: |
          ~/.local/bin/kdocs-cli auth set-token "${{ secrets.KINGSOFT_DOCS_TOKEN }}"

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install --quiet requests

      - name: 生成看板
        run: python3 generate_dashboard.py

      - name: 上传Pages产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output/

      - name: 部署到GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
