name: 处理数据编辑 Issue

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  process:
    if: startsWith(github.event.issue.title, '数据编辑:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 kdocs-cli
        run: |
          curl -fsSL "https://wpsai.wpscdn.cn/skillhub/pro/v2.5.16/releases/kdocs-cli-2.5.16-linux-amd64.tar.gz" -o /tmp/kdocs.tar.gz
          tar xzf /tmp/kdocs.tar.gz -C /usr/local/bin/
          chmod +x /usr/local/bin/kdocs-cli
          /usr/local/bin/kdocs-cli auth set-token "${{ secrets.KINGSOFT_DOCS_TOKEN }}"

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 解析 Issue 并写入 WPS
        id: process
        run: python3 process_issue.py '${{ github.event.issue.body }}'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}

      - name: 评论结果并关闭 Issue
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "✅ 数据已同步到 WPS 表格，看板将在 2 分钟内刷新。"
          gh issue close ${{ github.event.issue.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 触看看板刷新
        run: gh workflow run update-dashboard.yml
        env:
          GH_TOKEN: ${{ github.event.token }} || true
