name: 部署看板

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: 上传Pages产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output/

      - name: 部署到GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
